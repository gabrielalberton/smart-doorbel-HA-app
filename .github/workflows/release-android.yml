name: Optional GitHub-hosted Android release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (for example v1.0.0)
        required: true
        type: string


permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: android-app/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - uses: android-actions/setup-android@v3
      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Validate signing secrets
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$KEYSTORE_B64"
          test -n "$STORE_PASSWORD"
          test -n "$KEY_ALIAS"
          test -n "$KEY_PASSWORD"

      - name: Create build configuration
        env:
          ANDROID_APPLICATION_ID: ${{ vars.ANDROID_APPLICATION_ID }}
          APP_DEEP_LINK_SCHEME: ${{ vars.APP_DEEP_LINK_SCHEME }}
          APP_NAME: ${{ vars.APP_NAME }}
          VERSION_CODE_BASE: ${{ vars.ANDROID_VERSION_CODE_BASE }}
          GITHUB_RELEASE_REPO: ${{ github.repository }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          test -n "$ANDROID_APPLICATION_ID"
          cat > .env <<EOF
          ANDROID_APPLICATION_ID=$ANDROID_APPLICATION_ID
          APP_DEEP_LINK_SCHEME=${APP_DEEP_LINK_SCHEME:-$ANDROID_APPLICATION_ID}
          APP_NAME=${APP_NAME:-Smart Doorbell}
          ANDROID_VERSION_NAME=${TAG#v}
          ANDROID_VERSION_CODE=$(( ${VERSION_CODE_BASE:-1000} + GITHUB_RUN_NUMBER ))
          GITHUB_RELEASE_REPO=$GITHUB_RELEASE_REPO
          EOF

      - name: Install and sync Capacitor
        working-directory: android-app
        run: npm ci && npm run sync

      - name: Restore signing key
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_B64" | base64 --decode > android-app/android/app/release.keystore

      - name: Build signed APK
        working-directory: android-app/android
        env:
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/android-app/android/app/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew --no-daemon :app:assembleRelease --console=plain

      - name: Prepare release assets
        id: assets
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          APK="smart-doorbell-${TAG#v}.apk"
          cp android-app/android/app/build/outputs/apk/release/app-release.apk "$APK"
          sha256sum "$APK" > "$APK.sha256"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "apk=$APK" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ steps.assets.outputs.tag }}" "${{ steps.assets.outputs.apk }}" "${{ steps.assets.outputs.apk }}.sha256" --generate-notes --title "${{ steps.assets.outputs.tag }}"
